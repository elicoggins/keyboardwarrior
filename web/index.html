<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keyboard Warrior — browser demo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨️</text></svg>">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0e0e11;
    }
    canvas {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        position: absolute;
        background: #0e0e11;
        z-index: 0;
    }
</style>
</head>
<body>
<!-- Demo song: "Code Monkey" by Jonathan Coulton, CC BY-NC 3.0
     (jonathancoulton.com); chart by NoisyPuppet via Chorus Encore.
     Keep this attribution with any page that hosts the demo. -->
<canvas id="glcanvas" tabindex="1"></canvas>
<!-- Order matters: the bundle defines miniquad_add_plugin, kw_audio.js
     registers the audio import, load() instantiates the wasm. -->
<script src="mq_js_bundle.js"></script>
<script src="kw_audio.js"></script>
<script>load("keyboardwarrior.wasm");</script>
</body>
</html>
